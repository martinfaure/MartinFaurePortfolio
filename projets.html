<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Martin Faure — Projets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0e0e0e;
        --light: #f0ede6;
        --accent: #e05a00;
        --col: 340px;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--light);
        font-family: "Inter", sans-serif;
        overflow: hidden;
      }

      /* NAV */
      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 28px;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        background: linear-gradient(
          to bottom,
          rgba(14, 14, 14, 0.97) 0%,
          transparent 100%
        );
        backdrop-filter: blur(10px);
      }
      .nav-left {
        font-size: 13px;
        font-weight: 500;
        color: var(--light);
        opacity: 0.85;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .nav-toggle {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.07);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 16px;
        color: var(--light);
        transition: background 0.2s;
      }
      .nav-toggle:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      .nav-links {
        display: flex;
        gap: 2px;
        align-items: center;
      }
      .nav-links a {
        text-decoration: none;
        color: var(--light);
        font-size: 14px;
        font-weight: 500;
        padding: 7px 14px;
        border-radius: 999px;
        opacity: 0.55;
        transition: opacity 0.2s;
      }
      .nav-links a:hover {
        opacity: 1;
      }
      .nav-links a.active {
        background: var(--light);
        color: var(--bg);
        opacity: 1;
        font-weight: 700;
      }

      /* PROGRESS BAR */
      .progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        height: 2px;
        background: var(--light);
        z-index: 300;
        width: 0%;
        transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      }

      /* ════ FIXED LEFT PANEL ════ */
      .panel-left {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: var(--col);
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 76px 32px 52px;
        border-right: 1px solid rgba(255, 255, 255, 0.06);
        background: var(--bg);
      }

      /* ─── CLOCK WHEEL ─── */
      .clock-wrap {
        height: 240px;
        overflow: hidden;
        position: relative;
        mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          black 22%,
          black 78%,
          transparent 100%
        );
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          black 22%,
          black 78%,
          transparent 100%
        );
      }
      .clock-drum {
        display: flex;
        flex-direction: column;
        transition: transform 0.7s cubic-bezier(0.34, 1.4, 0.64, 1);
        will-change: transform;
      }
      .clock-digit {
        font-family: "Bebas Neue", sans-serif;
        font-size: 150px;
        line-height: 1;
        height: 150px;
        letter-spacing: -0.03em;
        color: rgba(255, 255, 255, 0.06);
        user-select: none;
        display: flex;
        align-items: center;
        transition:
          color 0.5s ease,
          transform 0.5s ease;
      }
      .clock-digit.is-active {
        color: rgba(255, 255, 255, 0.9);
      }
      .clock-digit.is-near {
        color: rgba(255, 255, 255, 0.14);
      }

      /* ─── META ─── */
      .panel-meta {
        display: flex;
        flex-direction: column;
      }
      .meta-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.28);
        margin-bottom: 10px;
      }
      .meta-name-wrap {
        overflow: hidden;
        margin-bottom: 6px;
      }
      .meta-name {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(28px, 3vw, 44px);
        color: var(--light);
        letter-spacing: 0.02em;
        line-height: 1.05;
        display: block;
      }
      .meta-type {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.42);
        letter-spacing: 0.02em;
        margin-bottom: 20px;
        line-height: 1.4;
      }
      .meta-desc {
        font-size: 13px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.6;
        margin-bottom: 24px;
        max-width: 280px;
      }
      .meta-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .meta-year {
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.3);
      }
      .btn-gh {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: var(--light);
        color: var(--bg);
        padding: 10px 20px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
        transition:
          opacity 0.2s,
          transform 0.2s;
      }
      .btn-gh:hover {
        opacity: 0.85;
        transform: scale(0.97);
      }
      .btn-gh svg {
        width: 14px;
        height: 14px;
        fill: var(--bg);
        flex-shrink: 0;
      }

      /* ════ SCROLLABLE RIGHT ════ */
      .scroll-wrap {
        position: fixed;
        top: 0;
        left: var(--col);
        right: 0;
        bottom: 0;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scroll-behavior: smooth;
        background: var(--bg);
      }

      .slide {
        height: 100vh;
        scroll-snap-align: start;
        scroll-snap-stop: always;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 60px;
      }

      /* ─── CONTAINER MOCKUP ─── */
      .mockup-container {
        position: relative;
        width: 100%;
        max-width: 900px;
        height: 80%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.92) translateY(30px);
        transition:
          opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .slide.active .mockup-container {
        opacity: 1;
        transform: scale(1) translateY(0);
      }

      /* Browser mockup */
      .browser-mockup {
        width: 100%;
        height: 100%;
        background: #1a1a1a;
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 25px 80px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .browser-header {
        height: 40px;
        background: #252525;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 8px;
      }

      .browser-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
      }
      .browser-dot:nth-child(1) {
        background: #ff5f57;
      }
      .browser-dot:nth-child(2) {
        background: #ffbd2e;
      }
      .browser-dot:nth-child(3) {
        background: #28ca42;
      }

      .browser-content {
        width: 100%;
        height: calc(100% - 40px);
        background: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        position: relative;
        overflow: hidden;
      }

      /* Image haute qualité */
      .project-img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: block;
        border-radius: 8px;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
        filter: contrast(1.05) saturate(1.1);
      }

      /* Glow effect */
      .browser-mockup::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: linear-gradient(
          135deg,
          rgba(224, 90, 0, 0.3),
          transparent 40%,
          transparent 60%,
          rgba(240, 237, 230, 0.2)
        );
        border-radius: 14px;
        opacity: 0;
        z-index: -1;
        transition: opacity 0.5s;
      }
      .slide.active .browser-mockup::before {
        opacity: 1;
      }

      /* Scroll hint */
      .scroll-hint {
        position: absolute;
        bottom: 32px;
        right: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        z-index: 10;
        opacity: 0.3;
        pointer-events: none;
      }
      .scroll-hint span {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
      }
      .scroll-line {
        width: 1px;
        height: 36px;
        background: var(--light);
        animation: pulse 1.8s ease infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scaleY(0.4);
          transform-origin: top;
          opacity: 0.3;
        }
        50% {
          transform: scaleY(1);
          transform-origin: top;
          opacity: 1;
        }
      }
      .slide:last-child .scroll-hint {
        display: none;
      }

      /* ══ RESPONSIVE ══ */
      @media (max-width: 1024px) {
        :root {
          --col: 280px;
        }
        .slide {
          padding: 60px 40px;
        }
      }

      @media (max-width: 860px) {
        :root {
          --col: 240px;
        }
        .clock-digit {
          font-size: 110px;
          height: 110px;
        }
        .clock-wrap {
          height: 180px;
        }
        .slide {
          padding: 60px 30px;
        }
      }

      @media (max-width: 600px) {
        html,
        body {
          overflow: auto;
        }
        .nav-links {
          display: none;
        }
        nav {
          padding: 14px 16px;
        }

        .panel-left {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: auto;
          width: 100%;
          height: auto;
          flex-direction: row;
          align-items: center;
          justify-content: space-between;
          padding: 56px 20px 16px;
          border-right: none;
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
          z-index: 50;
          gap: 16px;
        }
        .clock-wrap {
          width: 90px;
          height: 72px;
          flex-shrink: 0;
          mask-image: linear-gradient(
            to right,
            transparent 0%,
            black 18%,
            black 82%,
            transparent 100%
          );
        }
        .clock-drum {
          flex-direction: row;
        }
        .clock-digit {
          font-size: 60px;
          height: 72px;
          width: 72px;
          justify-content: center;
          flex-shrink: 0;
        }
        .panel-meta {
          flex: 1;
        }
        .meta-label {
          font-size: 9px;
          margin-bottom: 4px;
        }
        .meta-name {
          font-size: 18px;
        }
        .meta-type {
          font-size: 11px;
          margin-bottom: 8px;
        }
        .meta-desc {
          display: none;
        }
        .meta-actions {
          gap: 8px;
        }
        .meta-year {
          font-size: 11px;
        }
        .btn-gh {
          padding: 7px 14px;
          font-size: 10px;
        }

        .scroll-wrap {
          left: 0;
          top: 140px;
        }
        .slide {
          padding: 20px;
        }
        .browser-header {
          height: 32px;
        }
        .browser-dot {
          width: 10px;
          height: 10px;
        }
        .browser-content {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="progress-bar" id="progressBar"></div>

    <nav>
      <div class="nav-left">Développeur Web &amp; Designer</div>
      <div class="nav-right">
        <button class="nav-toggle">—</button>
        <div class="nav-links">
          <a href="./index.html">Accueil</a>
          <a href="#" class="active">Projets</a>
          <a href="./design.html">Design</a>
          <a href="./apropos.html">A Propos</a>
          <a href="./blog.html">Blog</a>
          <a href="./contact.html">Contact</a>
        </div>
      </div>
    </nav>

    <!-- ══ FIXED LEFT ══ -->
    <div class="panel-left">
      <div class="clock-wrap">
        <div class="clock-drum" id="drum"></div>
      </div>
      <div class="panel-meta">
        <div class="meta-label" id="mLabel">Projet 01 / 03</div>
        <div class="meta-name-wrap">
          <span class="meta-name" id="mName">Chef AI</span>
        </div>
        <div class="meta-type" id="mType">
          Application Mobile · React Native
        </div>
        <div class="meta-desc" id="mDesc">
          Une application mobile pour découvrir des recettes personnalisées.
        </div>
        <div class="meta-actions">
          <span class="meta-year" id="mYear">2025</span>
          <a href="#" class="btn-gh" id="mBtn">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
              />
            </svg>
            GitHub ↗
          </a>
        </div>
      </div>
    </div>

    <!-- ══ SCROLLABLE RIGHT ══ -->
    <div class="scroll-wrap" id="scrollWrap">
      <!-- PROJET 01 -->
      <div class="slide" id="s0">
        <div class="mockup-container">
          <div class="browser-mockup">
            <div class="browser-header">
              <div class="browser-dot"></div>
              <div class="browser-dot"></div>
              <div class="browser-dot"></div>
            </div>
            <div class="browser-content">
              <img
                class="project-img"
                src="./assets/chefai.jpg"
                alt="Chef AI"
              />
            </div>
          </div>
        </div>
        <div class="scroll-hint">
          <span>Scroll</span>
          <div class="scroll-line"></div>
        </div>
      </div>

      <!-- PROJET 02 -->
      <div class="slide" id="s1">
        <div class="mockup-container">
          <div class="browser-mockup">
            <div class="browser-header">
              <div class="browser-dot"></div>
              <div class="browser-dot"></div>
              <div class="browser-dot"></div>
            </div>
            <div class="browser-content">
              <img class="project-img" src="./assets/dryvea.png" alt="Dryvea" />
            </div>
          </div>
        </div>
        <div class="scroll-hint">
          <span>Scroll</span>
          <div class="scroll-line"></div>
        </div>
      </div>

      <!-- PROJET 03 -->
      <div class="slide" id="s2">
        <div class="mockup-container">
          <div class="browser-mockup">
            <div class="browser-header">
              <div class="browser-dot"></div>
              <div class="browser-dot"></div>
              <div class="browser-dot"></div>
            </div>
            <div class="browser-content">
              <img
                class="project-img"
                src="./assets/uptwowin.png"
                alt="Up2Win"
              />
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const PROJECTS = [
        {
          label: "Projet 01 / 03",
          name: "Chef AI",
          type: "Application Mobile · React Native",
          desc: "Une application mobile pour découvrir des recettes personnalisées basées sur vos préférences alimentaires.",
          year: "2025",
          href: "https://github.com/martinfaure",
          btn: "GitHub ↗",
          svg: true,
        },
        {
          label: "Projet 02 / 03",
          name: "Dryvea",
          type: "Site Web · Projet Fil Rouge",
          desc: "Plateforme e-commerce complète avec système de gestion de stock et interface d'administration.",
          year: "2026",
          href: "https://github.com/martinfaure",
          btn: "GitHub ↗",
          svg: true,
        },
        {
          label: "Projet 03 / 03",
          name: "Up2Win",
          type: "Design · Identité Visuelle",
          desc: "Création d'une identité visuelle complète avec logo, charte graphique et supports de communication.",
          year: "2024",
          href: "./design.html",
          btn: "Voir →",
          svg: false,
        },
      ];

      const DIGIT_H = 150;
      const drum = document.getElementById("drum");
      const wrap = document.getElementById("scrollWrap");
      const slides = document.querySelectorAll(".slide");
      const progressBar = document.getElementById("progressBar");
      const mLabel = document.getElementById("mLabel");
      const mName = document.getElementById("mName");
      const mType = document.getElementById("mType");
      const mDesc = document.getElementById("mDesc");
      const mYear = document.getElementById("mYear");
      const mBtn = document.getElementById("mBtn");

      const drumLabels = ["", "01", "02", "03", ""];
      drumLabels.forEach((txt) => {
        const el = document.createElement("div");
        el.className = "clock-digit";
        el.textContent = txt;
        drum.appendChild(el);
      });
      const drumDigits = drum.querySelectorAll(".clock-digit");

      function setDrum(idx) {
        const slot = idx + 1;
        const isMobile = window.innerWidth <= 600;
        const SLOT = isMobile ? 72 : DIGIT_H;
        const CENTER = isMobile ? 45 : 120;
        const center = slot * SLOT + SLOT / 2;
        const axis = isMobile ? "X" : "Y";
        drum.style.transform = `translate${axis}(${-(center - CENTER)}px)`;
        drumDigits.forEach((d, i) => {
          d.classList.remove("is-active", "is-near");
          if (i === slot) d.classList.add("is-active");
          else if (Math.abs(i - slot) === 1) d.classList.add("is-near");
        });
      }

      const GH_PATH =
        "M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12";

      let current = -1;

      function updateMeta(idx) {
        if (idx === current) return;
        const dir = idx > current ? 1 : -1;
        const p = PROJECTS[idx];
        const metaEls = [mLabel, mName.parentElement, mType, mDesc];

        metaEls.forEach((el, i) => {
          if (!el) return;
          el.style.transition = `opacity .2s ${i * 25}ms, transform .2s ${i * 25}ms`;
          el.style.opacity = "0";
          el.style.transform = `translateY(${-8 * dir}px)`;
        });

        setTimeout(() => {
          mLabel.textContent = p.label;
          mName.textContent = p.name;
          mType.textContent = p.type;
          if (mDesc) mDesc.textContent = p.desc;
          mYear.textContent = p.year;
          mBtn.href = p.href;
          if (p.svg) {
            mBtn.innerHTML = `<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:#0e0e0e;flex-shrink:0"><path d="${GH_PATH}"/></svg>${p.btn}`;
          } else {
            mBtn.textContent = p.btn;
          }
          metaEls.forEach((el) => {
            if (!el) return;
            el.style.transform = `translateY(${8 * dir}px)`;
          });
          requestAnimationFrame(() => {
            metaEls.forEach((el, i) => {
              if (!el) return;
              el.style.transition = `opacity .45s ${i * 40}ms, transform .45s ${i * 40}ms`;
              el.style.opacity = "1";
              el.style.transform = "translateY(0)";
            });
          });
        }, 180);
      }

      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) {
              entry.target.classList.remove("active");
              return;
            }
            entry.target.classList.add("active");
            const idx = Array.from(slides).indexOf(entry.target);
            setDrum(idx);
            updateMeta(idx);
            progressBar.style.width = ((idx + 1) / slides.length) * 100 + "%";
            current = idx;
          });
        },
        { root: wrap, threshold: 0.55 },
      );

      slides.forEach((s) => io.observe(s));

      const navToggle = document.querySelector(".nav-toggle");
      const navLinks = document.querySelector(".nav-links");
      if (navToggle && navLinks) {
        navToggle.addEventListener("click", () => {
          const isOpen = navLinks.style.display === "flex";
          if (isOpen) {
            navLinks.removeAttribute("style");
          } else {
            navLinks.style.display = "flex";
            navLinks.style.flexDirection = "column";
            navLinks.style.position = "fixed";
            navLinks.style.top = "60px";
            navLinks.style.right = "18px";
            navLinks.style.background = "#0e0e0e";
            navLinks.style.padding = "16px";
            navLinks.style.borderRadius = "12px";
            navLinks.style.border = "1px solid rgba(255,255,255,0.1)";
            navLinks.style.zIndex = "999";
          }
        });
      }

      setDrum(0);
      updateMeta(0);
      current = 0;
    </script>
  </body>
</html>
