<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Martin Faure — Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0a0a0a;
        --light: #f0ede6;
      }

      body {
        background: var(--bg);
        color: var(--light);
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
      }

      /* NAV */
      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 28px;
        z-index: 10;
        position: relative;
      }

      .nav-left {
        font-size: 13px;
        font-weight: 500;
        color: var(--light);
        opacity: 0.85;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .nav-toggle {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.07);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 16px;
        color: var(--light);
        transition: background 0.2s;
      }
      .nav-toggle:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .nav-links {
        display: flex;
        gap: 2px;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: var(--light);
        font-size: 14px;
        font-weight: 500;
        padding: 7px 14px;
        border-radius: 999px;
        opacity: 0.55;
        transition: opacity 0.2s;
      }
      .nav-links a:hover {
        opacity: 1;
      }
      .nav-links a.active {
        background: var(--light);
        color: var(--bg);
        opacity: 1;
        font-weight: 700;
      }

      /* HERO TITLE */
      .hero-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(80px, 13vw, 190px);
        line-height: 0.88;
        padding: 0 14px;
        color: var(--light);
        animation: fadeDown 0.7s ease both;
      }

      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* SUBTITLE ROW */
      .subtitle-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 32px 28px 48px;
        animation: fadeUp 0.8s 0.15s ease both;
      }

      .subtitle-left h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(40px, 5vw, 72px);
        line-height: 1.05;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 400;
        letter-spacing: 0.01em;
      }

      .subtitle-right {
        max-width: 300px;
        text-align: right;
        font-size: 13px;
        line-height: 1.65;
        color: rgba(255, 255, 255, 0.45);
        font-weight: 400;
        padding-top: 8px;
      }

      /* MASONRY GRID */
      .grid {
        columns: 3;
        column-gap: 12px;
        padding: 0 14px 80px;
        animation: fadeUp 0.9s 0.25s ease both;
      }

      .grid-item {
        break-inside: avoid;
        margin-bottom: 12px;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
      }

      .grid-item img {
        display: block;
        width: 100%;
        height: auto;
        transition:
          transform 0.5s ease,
          filter 0.3s ease;
        filter: brightness(0.95);
      }

      .grid-item:hover img {
        transform: scale(1.03);
        filter: brightness(1.1);
      }

      /* Overlay on hover */
      .grid-item::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0);
        transition: background 0.3s;
        border-radius: 6px;
      }
      .grid-item:hover::after {
        background: rgba(0, 0, 0, 0.15);
      }

      /* ─── IMAGE CARDS ─── */
      .card {
        width: 100%;
        border-radius: 6px;
        overflow: hidden;
        display: block;
        position: relative;
      }
      .card img {
        display: block;
        width: 100%;
        height: auto;
        transition:
          transform 0.5s ease,
          filter 0.3s ease;
        filter: brightness(0.95);
      }
      .grid-item:hover .card img {
        transform: scale(1.03);
        filter: brightness(1.08);
      }

      /* ══ RESPONSIVE ══ */
      @media (max-width: 860px) {
        .grid {
          columns: 2;
          column-gap: 10px;
          padding: 0 14px 60px;
        }
        .subtitle-row {
          padding: 24px 20px 36px;
          flex-direction: column;
          gap: 16px;
        }
        .subtitle-right {
          text-align: left;
          max-width: 100%;
        }
      }

      @media (max-width: 600px) {
        nav {
          padding: 14px 18px;
        }
        .nav-links {
          display: none;
        }
        .hero-title {
          font-size: clamp(52px, 16vw, 90px);
          padding: 0 12px;
        }
        .subtitle-row {
          padding: 20px 16px 28px;
          gap: 12px;
        }
        .subtitle-left h2 {
          font-size: clamp(28px, 8vw, 48px);
        }
        .subtitle-right {
          font-size: 12px;
        }
        .grid {
          columns: 2;
          column-gap: 8px;
          padding: 0 10px 48px;
        }
        .grid-item {
          margin-bottom: 8px;
          border-radius: 4px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-left">Développeur Web &amp; Designer</div>
      <div class="nav-right">
        <button class="nav-toggle">—</button>
        <div class="nav-links">
          <a href="./index.html" a>Accueil</a>
          <a href="./projets.html">Projets</a>
          <a href="./design.html" class="active">Design</a>
          <a href="./apropos.html">A Propos</a>
          <a href="./contact.html">Contact</a>
        </div>
      </div>
    </nav>

    <div class="hero-title">MART/N FAURE</div>

    <div class="subtitle-row">
      <div class="subtitle-left">
        <h2>Exploration<br />Graphiques</h2>
      </div>
      <div class="subtitle-right">
        Une série d'expérimentations visuelles centrée sur la<br />
        typographie, la texture et la composition
      </div>
    </div>

    <div class="grid">
      <!-- Image 1 -->
      <div class="grid-item">
        <div class="card">
          <img src="assets\1.png" alt="FROST" />
        </div>
      </div>

      <!-- Image 2 -->
      <div class="grid-item">
        <div class="card">
          <img src="assets\2.png" alt="DISCOVERING" />
        </div>
      </div>

      <!-- Image 3 -->
      <div class="grid-item">
        <div class="card">
          <img src="assets\3.png" alt="VIPER" />
        </div>
      </div>

      <!-- Image 4 -->
      <div class="grid-item">
        <div class="card">
          <img src="assets\4.png" alt="NOISE" />
        </div>
      </div>

      <!-- Image 5 -->
      <div class="grid-item">
        <div class="card">
          <img src="assets\5.png" alt="GRABZ" />
        </div>
      </div>

      <!-- Image 6 -->
      <div class="grid-item">
        <div class="card">
          <img src="assets\6.png" alt="INVASION" />
        </div>
      </div>

      <!-- Image 7 -->
      <div class="grid-item">
        <div class="card">
          <img src="assets\7.png" alt="CURRENTS" />
        </div>
      </div>

      <!-- Ajoute autant de grid-item que nécessaire -->
    </div>

    <script>
      // Mobile hamburger
      const toggle = document.querySelector(".nav-toggle");
      const links = document.querySelector(".nav-links");
      if (toggle && links) {
        toggle.addEventListener("click", () => {
          const open = links.style.display === "flex";
          links.style.display = open ? "" : "flex";
          links.style.flexDirection = "column";
          links.style.position = "fixed";
          links.style.top = "60px";
          links.style.right = "18px";
          links.style.background = "var(--bg, #0a0a0a)";
          links.style.padding = "16px";
          links.style.borderRadius = "12px";
          links.style.border = "1px solid rgba(255,255,255,0.1)";
          links.style.zIndex = "999";
          if (open) {
            links.removeAttribute("style");
          }
        });
      }
    </script>
  </body>
</html>
