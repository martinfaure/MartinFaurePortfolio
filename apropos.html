<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Martin Faure — A Propos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0a0a0a;
        --light: #f0ede6;
        --muted: rgba(255, 255, 255, 0.38);
      }

      body {
        background: var(--bg);
        color: var(--light);
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
        min-height: 100vh;
      }

      /* NAV */
      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 28px;
        position: relative;
        z-index: 10;
      }

      .nav-left {
        font-size: 13px;
        font-weight: 500;
        color: var(--light);
        opacity: 0.85;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .nav-toggle {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.07);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 16px;
        color: var(--light);
        transition: background 0.2s;
      }
      .nav-toggle:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .nav-links {
        display: flex;
        gap: 2px;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: var(--light);
        font-size: 14px;
        font-weight: 500;
        padding: 7px 14px;
        border-radius: 999px;
        opacity: 0.55;
        transition: opacity 0.2s;
      }
      .nav-links a:hover {
        opacity: 1;
      }
      .nav-links a.active {
        background: var(--light);
        color: var(--bg);
        opacity: 1;
        font-weight: 700;
      }

      /* HERO TITLE */
      .hero-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(80px, 13vw, 200px);
        line-height: 0.88;
        padding: 0 14px;
        color: var(--light);
        animation: fadeDown 0.7s ease both;
      }

      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* CONTENT GRID */
      .content-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        padding: 60px 28px 80px;
        align-items: start;
        animation: fadeUp 0.8s 0.15s ease both;
      }

      /* LEFT — roles */
      .roles {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .role {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(52px, 7vw, 100px);
        line-height: 1;
        color: rgba(255, 255, 255, 0.38);
        letter-spacing: 0.01em;
        transition: color 0.3s;
        cursor: default;
      }
      .role:hover {
        color: rgba(255, 255, 255, 0.7);
      }

      /* RIGHT — competences */
      .competences {
        padding-top: 8px;
      }

      .comp-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(36px, 4vw, 56px);
        color: rgba(255, 255, 255, 0.38);
        letter-spacing: 0.02em;
        margin-bottom: 32px;
      }

      .comp-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 32px;
      }

      .comp-col h4 {
        font-size: 13px;
        font-weight: 700;
        color: var(--light);
        margin-bottom: 14px;
        letter-spacing: 0.01em;
      }

      .comp-col ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .comp-col ul li {
        font-size: 15px;
        font-weight: 300;
        color: var(--muted);
        letter-spacing: 0.01em;
        transition: color 0.2s;
        cursor: default;
      }
      .comp-col ul li:hover {
        color: var(--light);
      }

      /* ══ RESPONSIVE ══ */
      @media (max-width: 860px) {
        .content-grid {
          grid-template-columns: 1fr;
          padding: 40px 24px 60px;
          gap: 48px;
        }
        .roles {
          flex-direction: row;
          flex-wrap: wrap;
          gap: 0 16px;
        }
        .role {
          font-size: clamp(40px, 10vw, 80px);
        }
      }

      @media (max-width: 600px) {
        nav {
          padding: 14px 18px;
        }
        .nav-links {
          display: none;
        }
        .hero-title {
          font-size: clamp(52px, 16vw, 90px);
          padding: 0 12px;
        }
        .content-grid {
          padding: 28px 18px 60px;
          gap: 36px;
        }
        .role {
          font-size: clamp(36px, 12vw, 64px);
        }
        .comp-title {
          font-size: clamp(28px, 7vw, 44px);
          margin-bottom: 24px;
        }
        .comp-cols {
          grid-template-columns: 1fr;
          gap: 28px;
        }
        .comp-col h4 {
          font-size: 12px;
        }
        .comp-col ul li {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-left">Développeur Web &amp; Designer</div>
      <div class="nav-right">
        <button class="nav-toggle">—</button>
        <div class="nav-links">
          <a href="./index.html">Accueil</a>
          <a href="./projets.html">Projets</a>
          <a href="./design.html">Design</a>
          <a href="./apropos.html" class="active">A Propos</a>
          <a href="./contact.html">Contact</a>
        </div>
      </div>
    </nav>

    <div class="hero-title">MART/N FAURE</div>

    <div class="content-grid">
      <!-- Left: roles -->
      <div class="roles">
        <div class="role">DEVELOPPEUR</div>
        <div class="role">DESIGNER</div>
      </div>

      <!-- Right: competences -->
      <div class="competences">
        <div class="comp-title">Compétences</div>
        <div class="comp-cols">
          <div class="comp-col">
            <h4>Languages &amp; Outils</h4>
            <ul>
              <li>Html</li>
              <li>Css</li>
              <li>Js</li>
              <li>Php</li>
              <li>MySql</li>
              <li>Git</li>
              <li>Postman</li>
              <li>Docker</li>
            </ul>
          </div>
          <div class="comp-col">
            <h4>Frameworks &amp; Librairies</h4>
            <ul>
              <li>Node.js</li>
              <li>TailwindCSS</li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Mobile hamburger
      const toggle = document.querySelector(".nav-toggle");
      const links = document.querySelector(".nav-links");
      if (toggle && links) {
        toggle.addEventListener("click", () => {
          const open = links.style.display === "flex";
          links.style.display = open ? "" : "flex";
          links.style.flexDirection = "column";
          links.style.position = "fixed";
          links.style.top = "60px";
          links.style.right = "18px";
          links.style.background = "var(--bg, #0a0a0a)";
          links.style.padding = "16px";
          links.style.borderRadius = "12px";
          links.style.border = "1px solid rgba(255,255,255,0.1)";
          links.style.zIndex = "999";
          if (open) {
            links.removeAttribute("style");
          }
        });
      }
    </script>
  </body>
</html>
